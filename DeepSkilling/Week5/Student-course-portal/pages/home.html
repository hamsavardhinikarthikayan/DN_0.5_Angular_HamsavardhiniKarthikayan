<h1>{{ portalName }}</h1>

<p>
  Manage your courses and track your academic progress.
</p>

<hr>

<h2>Binding Examples</h2>

<button
  [disabled]="!isPortalActive"
  (click)="onEnrollClick()">

  Enroll Now

</button>

<p>{{ message }}</p>

<hr>

<label>

  Search Course:

</label>

<input
  type="text"
  [(ngModel)]="searchTerm">

<p>

  Searching for:
  {{ searchTerm }}

</p>

<hr>

<div class="stats">

  <div class="card">

    <h3>Courses Available</h3>

    <p>{{ availableCourses }}</p>

  </div>

  <div class="card">

    <h3>Enrolled</h3>

    <p>3</p>

  </div>

  <div class="card">

    <h3>GPA</h3>

    <p>3.8</p>

  </div>

</div>

<hr>

<app-course-list></app-course-list>
<hr>

<app-course-summary-widget>

</app-course-summary-widget>
