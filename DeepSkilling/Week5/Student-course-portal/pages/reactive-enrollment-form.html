<h1>Reactive Student Enrollment Form</h1>

<form [formGroup]="enrollForm" (ngSubmit)="onSubmit()">

  <!-- Student Name -->

  <div>

    <label>Student Name</label><br>

    <input
      type="text"
      formControlName="studentName">

    <div class="error"
         *ngIf="enrollForm.get('studentName')?.touched">

      <span *ngIf="enrollForm.get('studentName')?.errors?.['required']">
        Name is required.
      </span>

      <span *ngIf="enrollForm.get('studentName')?.errors?.['minlength']">
        Name must be at least 3 characters.
      </span>

    </div>

  </div>

  <br>

  <!-- Email -->

  <div>

    <label>Email</label><br>

    <input
      type="email"
      formControlName="studentEmail">

    <div class="error"
         *ngIf="enrollForm.get('studentEmail')?.touched">

      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['required']">
        Email is required.
      </span>

      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['email']">
        Invalid Email.
      </span>

      <span *ngIf="enrollForm.get('studentEmail')?.pending">
        Checking email...
      </span>

      <span *ngIf="enrollForm.get('studentEmail')?.errors?.['emailTaken']">
        Email already taken.
      </span>

    </div>

  </div>

  <br>

  <!-- Course ID -->

  <div>

    <label>Course ID</label><br>

    <input
      type="text"
      formControlName="courseId">

    <div class="error"
         *ngIf="enrollForm.get('courseId')?.touched">

      <span *ngIf="enrollForm.get('courseId')?.errors?.['required']">
        Course ID is required.
      </span>

      <span *ngIf="enrollForm.get('courseId')?.errors?.['noCourseCode']">
        Course code starting with XX is not allowed.
      </span>

    </div>

  </div>

  <br>

  <!-- Semester -->

  <div>

    <label>Preferred Semester</label><br>

    <select formControlName="preferredSemester">

      <option value="Odd">Odd</option>

      <option value="Even">Even</option>

    </select>

  </div>

  <br>

  <!-- Terms -->

  <div>

    <label>

      <input
        type="checkbox"
        formControlName="agreeToTerms">

      I agree to the Terms & Conditions

    </label>

  </div>

  <br>

  <!-- Additional Courses -->

  <h3>Additional Courses</h3>

  <button
    type="button"
    (click)="addCourse()">

    Add Another Course

  </button>

  <br><br>

  <div formArrayName="additionalCourses">

    <div
      *ngFor="let control of additionalCourses.controls; let i = index">

      <input
        type="text"
        [formControlName]="i"
        placeholder="Additional Course">

      <button
        type="button"
        (click)="removeCourse(i)">

        Remove

      </button>

      <br><br>

    </div>

  </div>

  <hr>

  <button
    type="submit"
    [disabled]="enrollForm.invalid">

    Submit

  </button>

</form>
